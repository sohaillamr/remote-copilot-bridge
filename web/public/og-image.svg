<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#09090b"/>
      <stop offset="100%" style="stop-color:#1a1025"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="40" y="40" width="1120" height="550" rx="24" fill="none" stroke="#a78bfa" stroke-width="1" opacity="0.15"/>
  <!-- Dots grid pattern -->
  <g opacity="0.08" fill="#a78bfa">
    <circle cx="100" cy="100" r="2"/><circle cx="160" cy="100" r="2"/><circle cx="220" cy="100" r="2"/><circle cx="280" cy="100" r="2"/>
    <circle cx="100" cy="160" r="2"/><circle cx="160" cy="160" r="2"/><circle cx="220" cy="160" r="2"/><circle cx="280" cy="160" r="2"/>
    <circle cx="920" cy="470" r="2"/><circle cx="980" cy="470" r="2"/><circle cx="1040" cy="470" r="2"/><circle cx="1100" cy="470" r="2"/>
    <circle cx="920" cy="530" r="2"/><circle cx="980" cy="530" r="2"/><circle cx="1040" cy="530" r="2"/><circle cx="1100" cy="530" r="2"/>
  </g>
  <!-- Glow -->
  <ellipse cx="600" cy="315" rx="300" ry="200" fill="#7c3aed" opacity="0.04" filter="blur(80px)"/>
  <!-- Logo icon -->
  <g transform="translate(600,220)">
    <rect x="-36" y="-36" width="72" height="72" rx="18" fill="#a78bfa" opacity="0.1"/>
    <path d="M-8,-18 L-8,-4 Q-8,4 0,4 Q8,4 8,-4 L8,-18" fill="none" stroke="#a78bfa" stroke-width="4" stroke-linecap="round"/>
    <path d="M-16,4 Q-16,22 0,22 Q16,22 16,4" fill="none" stroke="#a78bfa" stroke-width="4" stroke-linecap="round"/>
    <circle cx="0" cy="-18" r="3" fill="#a78bfa"/>
  </g>
  <!-- Title -->
  <text x="600" y="310" text-anchor="middle" fill="white" font-family="system-ui,-apple-system,sans-serif" font-size="56" font-weight="800" letter-spacing="-2">Synapse</text>
  <!-- Subtitle -->
  <text x="600" y="360" text-anchor="middle" fill="#9ca3af" font-family="system-ui,-apple-system,sans-serif" font-size="22" font-weight="400">Access your AI tools from anywhere</text>
  <!-- Tags -->
  <g transform="translate(600,420)">
    <rect x="-280" y="-16" width="120" height="32" rx="16" fill="#a78bfa" opacity="0.1"/>
    <text x="-220" y="5" text-anchor="middle" fill="#a78bfa" font-family="monospace" font-size="13">Copilot</text>
    <rect x="-140" y="-16" width="100" height="32" rx="16" fill="#a78bfa" opacity="0.1"/>
    <text x="-90" y="5" text-anchor="middle" fill="#a78bfa" font-family="monospace" font-size="13">Claude</text>
    <rect x="-20" y="-16" width="110" height="32" rx="16" fill="#a78bfa" opacity="0.1"/>
    <text x="35" y="5" text-anchor="middle" fill="#a78bfa" font-family="monospace" font-size="13">Gemini</text>
    <rect x="110" y="-16" width="100" height="32" rx="16" fill="#a78bfa" opacity="0.1"/>
    <text x="160" y="5" text-anchor="middle" fill="#a78bfa" font-family="monospace" font-size="13">Codex</text>
  </g>
  <!-- URL -->
  <text x="600" y="560" text-anchor="middle" fill="#6b7280" font-family="monospace" font-size="14">synapse-green.vercel.app</text>
